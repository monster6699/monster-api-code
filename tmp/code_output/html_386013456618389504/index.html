<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 20px;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 1200px;
            width: 100%;
            gap: 25px;
        }
        
        header {
            text-align: center;
            margin-bottom: 10px;
        }
        
        h1 {
            font-size: 2.8rem;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00dbde, #fc00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #a0a0c0;
            margin-bottom: 20px;
        }
        
        .game-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            width: 100%;
        }
        
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 300px;
            max-width: 600px;
        }
        
        .game-board {
            border: 3px solid #4cc9f0;
            border-radius: 8px;
            background-color: #0f3460;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        
        #game-canvas {
            display: block;
            background-color: #0d1930;
        }
        
        .game-info {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 300px;
            max-width: 500px;
            background-color: rgba(15, 52, 96, 0.7);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .score-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #4cc9f0;
        }
        
        .score-box {
            text-align: center;
            flex: 1;
        }
        
        .score-label {
            font-size: 1.1rem;
            color: #a0a0c0;
            margin-bottom: 8px;
        }
        
        .score-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #4cc9f0;
        }
        
        .controls {
            margin-bottom: 25px;
        }
        
        .controls h3, .instructions h3 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            color: #4cc9f0;
        }
        
        .control-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        button {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 120px;
        }
        
        #start-btn {
            background-color: #00b894;
            color: white;
        }
        
        #start-btn:hover {
            background-color: #00a085;
            transform: translateY(-2px);
        }
        
        #pause-btn {
            background-color: #fdcb6e;
            color: #333;
        }
        
        #pause-btn:hover {
            background-color: #f9c855;
            transform: translateY(-2px);
        }
        
        #restart-btn {
            background-color: #e17055;
            color: white;
        }
        
        #restart-btn:hover {
            background-color: #d65a45;
            transform: translateY(-2px);
        }
        
        .instructions {
            margin-bottom: 20px;
        }
        
        .instructions ul {
            padding-left: 20px;
            margin-bottom: 15px;
        }
        
        .instructions li {
            margin-bottom: 8px;
            line-height: 1.5;
            color: #d0d0e0;
        }
        
        .key-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
            max-width: 200px;
            margin: 10px auto 0;
        }
        
        .key {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 50px;
            background-color: #1a1a2e;
            border-radius: 6px;
            font-weight: bold;
            color: #4cc9f0;
            border: 2px solid #4cc9f0;
        }
        
        .key.up {
            grid-column: 2;
            grid-row: 1;
        }
        
        .key.left {
            grid-column: 1;
            grid-row: 2;
        }
        
        .key.right {
            grid-column: 3;
            grid-row: 2;
        }
        
        .key.down {
            grid-column: 2;
            grid-row: 3;
        }
        
        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
            max-width: 250px;
            margin: 20px auto 0;
        }
        
        .mobile-controls .key {
            height: 70px;
            font-size: 1.5rem;
        }
        
        .game-status {
            text-align: center;
            font-size: 1.3rem;
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            background-color: rgba(76, 201, 240, 0.1);
            color: #4cc9f0;
            min-height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        footer {
            margin-top: 20px;
            text-align: center;
            color: #a0a0c0;
            font-size: 0.9rem;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .game-area {
                flex-direction: column;
                align-items: center;
            }
            
            .game-info {
                width: 100%;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            .subtitle {
                font-size: 1rem;
            }
            
            .key-controls {
                display: none;
            }
            
            .mobile-controls {
                display: grid;
            }
        }
        
        @media (max-width: 480px) {
            .control-buttons {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .score-value {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>贪吃蛇游戏</h1>
            <p class="subtitle">使用键盘方向键或屏幕按钮控制贪吃蛇移动，吃到食物增长身体，避免撞墙或撞到自己！</p>
        </header>
        
        <div class="game-area">
            <div class="game-container">
                <div class="game-board">
                    <canvas id="game-canvas" width="600" height="600"></canvas>
                </div>
                
                <div class="mobile-controls">
                    <div class="key up">↑</div>
                    <div class="key left">←</div>
                    <div class="key right">→</div>
                    <div class="key down">↓</div>
                </div>
            </div>
            
            <div class="game-info">
                <div class="score-container">
                    <div class="score-box">
                        <div class="score-label">当前分数</div>
                        <div id="score" class="score-value">0</div>
                    </div>
                    <div class="score-box">
                        <div class="score-label">最高分数</div>
                        <div id="high-score" class="score-value">0</div>
                    </div>
                </div>
                
                <div class="controls">
                    <h3>游戏控制</h3>
                    <div class="control-buttons">
                        <button id="start-btn">开始游戏</button>
                        <button id="pause-btn">暂停游戏</button>
                        <button id="restart-btn">重新开始</button>
                    </div>
                    
                    <div class="key-controls">
                        <div class="key up">↑</div>
                        <div class="key left">←</div>
                        <div class="key right">→</div>
                        <div class="key down">↓</div>
                    </div>
                </div>
                
                <div class="instructions">
                    <h3>游戏说明</h3>
                    <ul>
                        <li>使用键盘方向键或屏幕按钮控制贪吃蛇移动</li>
                        <li>贪吃蛇需要吃到红色食物来增加长度和分数</li>
                        <li>每吃到一个食物得10分</li>
                        <li>贪吃蛇撞到墙壁或自己的身体游戏结束</li>
                        <li>游戏速度会随着分数增加而逐渐提高</li>
                    </ul>
                </div>
                
                <div class="game-status" id="game-status">
                    点击"开始游戏"按钮开始游戏
                </div>
            </div>
        </div>
        
        <footer>
            <p>贪吃蛇游戏 | 使用原生HTML5、CSS3和JavaScript实现 | 2023</p>
        </footer>
    </div>

    <script>
        // 游戏变量
        let canvas = document.getElementById('game-canvas');
        let ctx = canvas.getContext('2d');
        let scoreElement = document.getElementById('score');
        let highScoreElement = document.getElementById('high-score');
        let gameStatusElement = document.getElementById('game-status');
        let startButton = document.getElementById('start-btn');
        let pauseButton = document.getElementById('pause-btn');
        let restartButton = document.getElementById('restart-btn');
        
        // 游戏配置
        const gridSize = 20; // 网格大小
        const gridWidth = canvas.width / gridSize;
        const gridHeight = canvas.height / gridSize;
        
        // 游戏状态
        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let gameSpeed = 150; // 初始速度（毫秒）
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = false;
        let gameLoop;
        
        // 初始化游戏
        function initGame() {
            // 初始化蛇
            snake = [
                {x: 5, y: 10},
                {x: 4, y: 10},
                {x: 3, y: 10}
            ];
            
            // 生成食物
            generateFood();
            
            // 重置方向
            direction = 'right';
            nextDirection = 'right';
            
            // 重置分数和速度
            score = 0;
            gameSpeed = 150;
            updateScore();
            
            // 更新最高分显示
            highScoreElement.textContent = highScore;
            
            // 更新游戏状态
            gameStatusElement.textContent = "游戏准备中...";
        }
        
        // 生成食物
        function generateFood() {
            // 确保食物不会生成在蛇身上
            let foodOnSnake;
            do {
                foodOnSnake = false;
                food = {
                    x: Math.floor(Math.random() * gridWidth),
                    y: Math.floor(Math.random() * gridHeight)
                };
                
                // 检查食物是否在蛇身上
                for (let segment of snake) {
                    if (segment.x === food.x && segment.y === food.y) {
                        foodOnSnake = true;
                        break;
                    }
                }
            } while (foodOnSnake);
        }
        
        // 绘制游戏
        function drawGame() {
            // 清除画布
            ctx.fillStyle = '#0d1930';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格
            drawGrid();
            
            // 绘制蛇
            drawSnake();
            
            // 绘制食物
            drawFood();
        }
        
        // 绘制网格
        function drawGrid() {
            ctx.strokeStyle = '#1a2b4a';
            ctx.lineWidth = 0.5;
            
            // 绘制垂直线
            for (let x = 0; x <= canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            
            // 绘制水平线
            for (let y = 0; y <= canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }
        
        // 绘制蛇
        function drawSnake() {
            // 绘制蛇身
            for (let i = 0; i < snake.length; i++) {
                // 蛇头
                if (i === 0) {
                    ctx.fillStyle = '#4cc9f0';
                    ctx.fillRect(
                        snake[i].x * gridSize, 
                        snake[i].y * gridSize, 
                        gridSize, 
                        gridSize
                    );
                    
                    // 蛇头眼睛
                    ctx.fillStyle = '#0d1930';
                    let eyeSize = gridSize / 5;
                    
                    // 根据方向绘制眼睛
                    if (direction === 'right') {
                        ctx.fillRect(
                            snake[i].x * gridSize + gridSize - eyeSize * 2, 
                            snake[i].y * gridSize + eyeSize, 
                            eyeSize, 
                            eyeSize
                        );
                        ctx.fillRect(
                            snake[i].x * gridSize + gridSize - eyeSize * 2, 
                            snake[i].y * gridSize + gridSize - eyeSize * 2, 
                            eyeSize, 
                            eyeSize
                        );
                    } else if (direction === 'left') {
                        ctx.fillRect(
                            snake[i].x * gridSize + eyeSize, 
                            snake[i].y * gridSize + eyeSize, 
                            eyeSize, 
                            eyeSize
                        );
                        ctx.fillRect(
                            snake[i].x * gridSize + eyeSize, 
                            snake[i].y * gridSize + gridSize - eyeSize * 2, 
                            eyeSize, 
                            eyeSize
                        );
                    } else if (direction === 'up') {
                        ctx.fillRect(
                            snake[i].x * gridSize + eyeSize, 
                            snake[i].y * gridSize + eyeSize, 
                            eyeSize, 
                            eyeSize
                        );
                        ctx.fillRect(
                            snake[i].x * gridSize + gridSize - eyeSize * 2, 
                            snake[i].y * gridSize + eyeSize, 
                            eyeSize, 
                            eyeSize
                        );
                    } else if (direction === 'down') {
                        ctx.fillRect(
                            snake[i].x * gridSize + eyeSize, 
                            snake[i].y * gridSize + gridSize - eyeSize * 2, 
                            eyeSize, 
                            eyeSize
                        );
                        ctx.fillRect(
                            snake[i].x * gridSize + gridSize - eyeSize * 2, 
                            snake[i].y * gridSize + gridSize - eyeSize * 2, 
                            eyeSize, 
                            eyeSize
                        );
                    }
                } 
                // 蛇身
                else {
                    // 渐变颜色，从头部到尾部颜色变深
                    let colorValue = 200 - (i * 10);
                    if (colorValue < 50) colorValue = 50;
                    
                    ctx.fillStyle = `rgb(76, ${colorValue}, 240)`;
                    ctx.fillRect(
                        snake[i].x * gridSize, 
                        snake[i].y * gridSize, 
                        gridSize, 
                        gridSize
                    );
                    
                    // 蛇身内部小方块
                    ctx.fillStyle = `rgba(13, 25, 48, 0.3)`;
                    ctx.fillRect(
                        snake[i].x * gridSize + 4, 
                        snake[i].y * gridSize + 4, 
                        gridSize - 8, 
                        gridSize - 8
                    );
                }
            }
        }
        
        // 绘制食物
        function drawFood() {
            // 绘制食物（红色圆点）
            ctx.fillStyle = '#ff4757';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // 食物内部亮点
            ctx.fillStyle = '#ff6b81';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2 - 3,
                food.y * gridSize + gridSize / 2 - 3,
                gridSize / 6,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }
        
        // 更新游戏状态
        function updateGame() {
            // 更新蛇的方向
            direction = nextDirection;
            
            // 根据方向移动蛇头
            let head = {x: snake[0].x, y: snake[0].y};
            
            switch(direction) {
                case 'up':
                    head.y--;
                    break;
                case 'down':
                    head.y++;
                    break;
                case 'left':
                    head.x--;
                    break;
                case 'right':
                    head.x++;
                    break;
            }
            
            // 检查是否撞墙
            if (
                head.x < 0 || 
                head.x >= gridWidth || 
                head.y < 0 || 
                head.y >= gridHeight
            ) {
                gameOver();
                return;
            }
            
            // 检查是否撞到自己
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }
            
            // 将新的头部添加到蛇
            snake.unshift(head);
            
            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                // 增加分数
                score += 10;
                updateScore();
                
                // 生成新食物
                generateFood();
                
                // 每得50分增加一次速度
                if (score % 50 === 0 && gameSpeed > 50) {
                    gameSpeed -= 10;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(updateGame, gameSpeed);
                    gameStatusElement.textContent = `速度提升！当前速度: ${gameSpeed}ms`;
                    setTimeout(() => {
                        if (gameRunning) {
                            gameStatusElement.textContent = "游戏中...";
                        }
                    }, 1500);
                }
            } else {
                // 如果没有吃到食物，移除尾部
                snake.pop();
            }
            
            // 重新绘制游戏
            drawGame();
        }
        
        // 更新分数显示
        function updateScore() {
            scoreElement.textContent = score;
            
            // 更新最高分
            if (score > highScore) {
                highScore = score;
                highScoreElement.textContent = highScore;
                localStorage.setItem('snakeHighScore', highScore);
            }
        }
        
        // 游戏结束
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            
            // 显示游戏结束信息
            gameStatusElement.textContent = `游戏结束！最终得分: ${score}`;
            
            // 绘制游戏结束效果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#ff4757';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 30);
            
            ctx.fillStyle = '#fff';
            ctx.font = '24px Arial';
            ctx.fillText(`得分: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
            ctx.fillText(`最高分: ${highScore}`, canvas.width / 2, canvas.height / 2 + 60);
        }
        
        // 开始游戏
        function startGame() {
            if (!gameRunning) {
                gameRunning = true;
                gameStatusElement.textContent = "游戏中...";
                gameLoop = setInterval(updateGame, gameSpeed);
                drawGame();
            }
        }
        
        // 暂停游戏
        function pauseGame() {
            if (gameRunning) {
                gameRunning = false;
                clearInterval(gameLoop);
                gameStatusElement.textContent = "游戏已暂停";
                
                // 绘制暂停效果
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#fdcb6e';
                ctx.font = 'bold 48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('游戏暂停', canvas.width / 2, canvas.height / 2);
            }
        }
        
        // 重新开始游戏
        function restartGame() {
            clearInterval(gameLoop);
            initGame();
            drawGame();
            gameRunning = false;
            gameStatusElement.textContent = "点击'开始游戏'按钮开始游戏";
        }
        
        // 键盘控制
        function handleKeyDown(e) {
            // 防止方向键滚动页面
            if ([37, 38, 39, 40].includes(e.keyCode)) {
                e.preventDefault();
            }
            
            // 根据按键更新方向
            switch(e.keyCode) {
                case 38: // 上箭头
                    if (direction !== 'down') nextDirection = 'up';
                    break;
                case 40: // 下箭头
                    if (direction !== 'up') nextDirection = 'down';
                    break;
                case 37: // 左箭头
                    if (direction !== 'right') nextDirection = 'left';
                    break;
                case 39: // 右箭头
                    if (direction !== 'left') nextDirection = 'right';
                    break;
                case 32: // 空格键 - 暂停/继续
                    if (gameRunning) {
                        pauseGame();
                    } else {
                        startGame();
                    }
                    break;
            }
        }
        
        // 移动端触摸控制
        function setupMobileControls() {
            const mobileKeys = document.querySelectorAll('.mobile-controls .key');
            
            mobileKeys.forEach(key => {
                key.addEventListener('click', function() {
                    const directionClass = this.classList[1]; // up, down, left, right
                    
                    // 根据点击的按钮更新方向
                    switch(directionClass) {
                        case 'up':
                            if (direction !== 'down') nextDirection = 'up';
                            break;
                        case 'down':
                            if (direction !== 'up') nextDirection = 'down';
                            break;
                        case 'left':
                            if (direction !== 'right') nextDirection = 'left';
                            break;
                        case 'right':
                            if (direction !== 'left') nextDirection = 'right';
                            break;
                    }
                    
                    // 如果游戏未运行，点击方向键也会开始游戏
                    if (!gameRunning) {
                        startGame();
                    }
                });
            });
        }
        
        // 初始化事件监听器
        function initEventListeners() {
            // 键盘控制
            document.addEventListener('keydown', handleKeyDown);
            
            // 按钮控制
            startButton.addEventListener('click', startGame);
            pauseButton.addEventListener('click', pauseGame);
            restartButton.addEventListener('click', restartGame);
            
            // 移动端控制
            setupMobileControls();
            
            // 防止触摸屏上的默认行为
            document.addEventListener('touchmove', function(e) {
                if (e.target.classList.contains('key')) {
                    e.preventDefault();
                }
            }, { passive: false });
        }
        
        // 窗口大小调整时调整Canvas大小
        function resizeCanvas() {
            const container = document.querySelector('.game-board');
            const containerWidth = container.clientWidth;
            
            // 保持Canvas为正方形
            const newSize = Math.min(containerWidth, 600);
            
            canvas.width = newSize;
            canvas.height = newSize;
            
            // 重新绘制游戏
            drawGame();
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', function() {
            initGame();
            initEventListeners();
            drawGame();
            
            // 初始调整Canvas大小
            resizeCanvas();
            
            // 监听窗口大小变化
            window.addEventListener('resize', resizeCanvas);
        });
    </script>
</body>
</html>
